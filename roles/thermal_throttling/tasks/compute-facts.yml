---
- name: Compute Reduced Build Parallelism From Safe Core Limit
  ansible.builtin.set_fact:
    thermal_throttling_reduced_jobs: >-
      {{ [((system_discovery_safe_core_limit | int) / 3) | round(0, 'floor') | int, 1] | max }}
    thermal_throttling_full_jobs: >-
      {{ system_discovery_safe_core_limit | int }}
    thermal_throttling_epp_value: >-
      {{ (system_discovery_safe_core_limit | int > 4) | ternary('balance_performance', 'performance') }}
    thermal_throttling_temperature_threshold: >-
      {{ ([[65000 + (ansible_facts['processor_vcpus'] | int) * 250, 65000] | max, 72000] | min) | int }}

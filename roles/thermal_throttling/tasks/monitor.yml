---
- name: Compute Reduced Build Parallelism From Safe Core Limit
  ansible.builtin.set_fact:
    thermal_throttling_reduced_jobs: >-
      {{ [((system_discovery_safe_core_limit | int) / 2) | round(0, 'floor') | int, 1] | max }}
    thermal_throttling_full_jobs: >-
      {{ system_discovery_safe_core_limit | int }}
    thermal_throttling_epp_value: balance_performance
    thermal_throttling_temperature_threshold: 80000

- name: Create Thermal Throttling Config Directory
  ansible.builtin.file:
    path: /etc/thermal-throttling
    state: directory
    mode: '0755'

- name: Deploy Thermal Throttling Configuration Data
  ansible.builtin.copy:
    dest: /etc/thermal-throttling/config.json
    content: |
      {{ {
        "temperature_threshold_millidegrees": thermal_throttling_temperature_threshold,
        "full_parallelism_jobs": thermal_throttling_full_jobs,
        "reduced_parallelism_jobs": thermal_throttling_reduced_jobs,
        "energy_performance_preference": thermal_throttling_epp_value,
        "thermal_zone_glob": "/sys/class/thermal/thermal_zone*/temp",
        "profile_d_path": "/etc/profile.d/dev-limits.sh"
      } | to_nice_json }}
    mode: '0644'

- name: Write Initial Build Parallelism Profile
  ansible.builtin.copy:
    dest: /etc/profile.d/dev-limits.sh
    content: |
      export CARGO_BUILD_JOBS={{ thermal_throttling_full_jobs }}
      export MAKEFLAGS=-j{{ thermal_throttling_full_jobs }}
      export NINJAJOBS={{ thermal_throttling_full_jobs }}
    mode: '0644'

- name: Deploy Thermal Monitor Script
  ansible.builtin.copy:
    dest: /usr/local/bin/thermal-monitor.py
    src: thermal-monitor.py
    mode: '0755'

- name: Deploy Thermal Monitor Systemd Service Unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/thermal-monitor.service
    content: |
      [Unit]
      Description=Thermal Throttling Protection Monitor
      After=multi-user.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/thermal-monitor.py
    mode: '0644'

- name: Deploy Thermal Monitor Systemd Timer Unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/thermal-monitor.timer
    content: |
      [Unit]
      Description=Thermal Throttling Protection Poll Timer

      [Timer]
      OnCalendar=*:0/2
      Persistent=true

      [Install]
      WantedBy=timers.target
    mode: '0644'

- name: Determine Thermal Monitor Service Registration Status
  ansible.builtin.systemd:
    name: thermal-monitor.timer
  register: thermal_throttling_timer_check

- name: Enable and Start Thermal Monitor Timer
  ansible.builtin.systemd:
    name: thermal-monitor.timer
    state: started
    enabled: true
    daemon_reload: true
  when:
    - thermal_throttling_timer_check.status is defined
    - thermal_throttling_timer_check.status.LoadState != 'not-found'

- name: Trigger Initial Thermal Monitor Run
  ansible.builtin.systemd:
    name: thermal-monitor.service
    state: started
  when:
    - thermal_throttling_timer_check.status is defined
    - thermal_throttling_timer_check.status.LoadState != 'not-found'

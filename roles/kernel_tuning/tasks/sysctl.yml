---
- name: Apply OOM Prevention Kernel Parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-oom-tuning.conf
    state: present
    reload: true
  loop:
    - {key: 'vm.swappiness', value: '10'}
    - {key: 'vm.watermark_scale_factor', value: '{{ system_discovery_watermark_scale_factor }}'}
    - {key: 'vm.vfs_cache_pressure', value: '50'}
    - {key: 'vm.dirty_ratio', value: '{{ system_discovery_dirty_ratio }}'}
    - {key: 'vm.dirty_background_ratio', value: '{{ system_discovery_dirty_background_ratio }}'}
    - {key: 'vm.min_free_kbytes', value: '{{ system_discovery_min_free_kbytes }}'}
    - {key: 'vm.admin_reserve_kbytes', value: '{{ system_discovery_admin_reserve_kbytes }}'}
    - {key: 'vm.user_reserve_kbytes', value: '{{ system_discovery_user_reserve_kbytes }}'}
    - {key: 'vm.compaction_proactiveness', value: '{{ system_discovery_compaction_proactiveness }}'}
    - {key: 'vm.page_lock_unfairness', value: '{{ system_discovery_page_lock_unfairness }}'}
    - {key: 'vm.zone_reclaim_mode', value: '{{ system_discovery_zone_reclaim_mode }}'}

- name: Check Kernel Support for reap_mem_on_sigkill
  ansible.builtin.stat:
    path: /proc/sys/vm/reap_mem_on_sigkill
  register: kernel_tuning_reap_check

- name: Apply reap_mem_on_sigkill (kernel 5.15+)
  ansible.posix.sysctl:
    name: vm.reap_mem_on_sigkill
    value: '{{ system_discovery_reap_mem_on_sigkill }}'
    sysctl_file: /etc/sysctl.d/99-oom-tuning.conf
    state: present
    reload: true
  when: kernel_tuning_reap_check.stat.exists

- name: Check Kernel Support for oom_dump_tasks
  ansible.builtin.stat:
    path: /proc/sys/vm/oom_dump_tasks
  register: kernel_tuning_oomdump_check

- name: Apply oom_dump_tasks (kernel 5.15+)
  ansible.posix.sysctl:
    name: vm.oom_dump_tasks
    value: '{{ system_discovery_oom_dump_tasks }}'
    sysctl_file: /etc/sysctl.d/99-oom-tuning.conf
    state: present
    reload: true
  when: kernel_tuning_oomdump_check.stat.exists

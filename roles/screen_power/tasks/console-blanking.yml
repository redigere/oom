---
- name: Check for GRUB Configuration File
  ansible.builtin.stat:
    path: /etc/default/grub
  register: screen_power_grub_config

- name: Disable Console Blanking on Kernel Command Line
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT="((?:(?!\bconsoleblank=0\b).)*)"$'
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="\1 consoleblank=0"'
    backrefs: true
  register: screen_power_grub_updated
  when: screen_power_grub_config.stat.exists

- name: Update Bootloader to Persist Console Blanking Parameter (Debian)
  ansible.builtin.command: update-grub
  when:
    - screen_power_grub_config.stat.exists
    - screen_power_grub_updated.changed
    - ansible_facts['os_family'] == 'Debian'
  changed_when: true

- name: Update Bootloader to Persist Console Blanking Parameter (RedHat)
  ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg
  when:
    - screen_power_grub_config.stat.exists
    - screen_power_grub_updated.changed
    - ansible_facts['os_family'] == 'RedHat'
  changed_when: true

---
- name: Configure EarlyOOM Process Termination Policy for Responsive Desktop
  ansible.posix.sysctl:
    name: "vm.panic_on_oom"
    value: "0"
    sysctl_file: /etc/sysctl.d/99-oom-tuning.conf
    state: present
    reload: true

- name: Write EarlyOOM Config With Hardware-Scaled Memory and Swap Thresholds
  ansible.builtin.copy:
    dest: /etc/default/earlyoom
    content: >-
      EARLYOOM_ARGS="-m {{ system_discovery_earlyoom_min_free_pct }},{{
      (system_discovery_earlyoom_min_free_pct | int) + 2 }}
      -s 10 -S 15
      --prefer '(rustc|cargo|cc1plus|clang|make|ninja|ld|lld|mold|gold)'
      --avoid '(java|gnome-shell|Xorg|Xwayland|pipewire|pulseaudio|systemd|dbus|{{
      "" }}earlyoom|agy|antigravity-ide|codium|vscode|code|intellij|node|python.*|{{
      "" }}bash|npm|rg|chromium|chrome|electron|skype|slack|teams|discord|spotify|{{
      "" }}brave|vivaldi|opera|firefox)'"
    mode: '0644'
  register: oom_handler_earlyoom_config

---
- name: Check EarlyOOM Service Registration
  ansible.builtin.systemd:
    name: earlyoom
  register: oom_handler_earlyoom_service_check

- name: Restart and Enable EarlyOOM Service
  ansible.builtin.systemd:
    name: earlyoom
    state: restarted
    enabled: true
    daemon_reload: true
  when:
    - oom_handler_earlyoom_config.changed
    - oom_handler_earlyoom_service_check.status is defined
    - oom_handler_earlyoom_service_check.status.LoadState != 'not-found'

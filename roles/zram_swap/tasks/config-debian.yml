---
- name: Write ZRAM Configuration
  ansible.builtin.copy:
    dest: /etc/default/zramswap
    content: |
      ALGO=lz4
      SIZE={{ system_discovery_target_zram_mb }}
      PRIORITY=100
    mode: '0644'
  register: zram_swap_config_debian
  when: ansible_facts['os_family'] == 'Debian'

- name: Check ZRAM Swap Service Registration
  ansible.builtin.stat:
    path: /lib/systemd/system/zramswap.service
  register: zram_swap_service_check
  when: ansible_facts['os_family'] == 'Debian'

- name: Stop ZRAM Swap Service Before Device Reset
  ansible.builtin.systemd:
    name: zramswap
    state: stopped
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed
    - zram_swap_service_check.stat.exists

- name: Check If ZRAM Device Is Active
  ansible.builtin.command: swapon --show=NAME --noheadings
  register: zram_swap_active_devices
  changed_when: false
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed

- name: Deactivate ZRAM Swap Device
  ansible.builtin.command: swapoff /dev/zram0
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed
    - "'/dev/zram0' in zram_swap_active_devices.stdout_lines"
  changed_when: true

- name: Check If ZRAM Device File Exists
  ansible.builtin.stat:
    path: /dev/zram0
  register: zram_swap_device_exists
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed

- name: Remove ZRAM Device
  ansible.builtin.command: zramctl -r /dev/zram0
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed
    - zram_swap_device_exists.stat.exists
  changed_when: true

- name: Start ZRAM Swap Service on Config Change (Debian)
  ansible.builtin.systemd:
    name: zramswap
    state: started
    daemon_reload: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed
    - zram_swap_service_check.stat.exists
  changed_when: true

- name: Ensure ZRAM Swap Service Is Enabled at Boot (Debian)
  ansible.builtin.systemd:
    name: zramswap
    enabled: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_service_check.stat.exists

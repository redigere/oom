---
- name: Write ZRAM Configuration
  ansible.builtin.copy:
    dest: /etc/default/zramswap
    content: |
      ALGO=lz4
      SIZE={{ system_discovery_target_zram_mb }}
      PRIORITY=100
    mode: '0644'
  register: zram_swap_config_debian
  when: ansible_facts['os_family'] == 'Debian'

- name: Check ZRAM Swap Service Registration
  ansible.builtin.stat:
    path: /lib/systemd/system/zramswap.service
  register: zram_swap_service_check
  when: ansible_facts['os_family'] == 'Debian'

- name: Reset ZRAM Device Before Applying New Configuration
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      systemctl stop zramswap 2>/dev/null
      if swapon --show=NAME --noheadings 2>/dev/null | grep -qxF /dev/zram0; then
        if ! swapoff /dev/zram0 2>/dev/null; then
          echo "WARNING: swapoff failed (RAM full). Deferring ZRAM reset to next boot." >&2
          exit 0
        fi
      fi
      if test -e /dev/zram0; then
        zramctl -r /dev/zram0 2>/dev/null || exit 0
      fi
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed
  changed_when: true

- name: Restart ZRAM Swap Service on Config Change (Debian)
  ansible.builtin.systemd:
    name: zramswap
    state: restarted
    daemon_reload: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed
    - zram_swap_service_check.stat.exists
  changed_when: true

- name: Ensure ZRAM Swap Service Is Enabled at Boot (Debian)
  ansible.builtin.systemd:
    name: zramswap
    enabled: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_service_check.stat.exists

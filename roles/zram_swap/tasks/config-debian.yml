---
- name: Write ZRAM Configuration
  ansible.builtin.copy:
    dest: /etc/default/zramswap
    content: |
      ALGO=zstd
      SIZE={{ system_discovery_target_zram_mb }}
      PRIORITY=100
    mode: '0644'
  register: zram_swap_config_debian
  when: ansible_facts['os_family'] == 'Debian'

- name: Check ZRAM Swap Service Registration
  ansible.builtin.systemd:
    name: zramswap
  register: zram_swap_service_check
  when: ansible_facts['os_family'] == 'Debian'

- name: Reset ZRAM Device Before Applying New Configuration
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      if swapon --show=NAME --noheadings 2>/dev/null | grep -qxF /dev/zram0; then
        swapoff /dev/zram0
      fi
      zramctl -r /dev/zram0
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed
  changed_when: true

- name: Restart and Enable ZRAM Swap Service (Debian)
  ansible.builtin.systemd:
    name: zramswap
    state: restarted
    enabled: true
    daemon_reload: true
  when:
    - ansible_facts['os_family'] == 'Debian'
    - zram_swap_config_debian.changed
    - zram_swap_service_check.status is defined
    - zram_swap_service_check.status.LoadState != 'not-found'

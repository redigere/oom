---
name: oom-commit-convention

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify conventional commit format
        run: python3 .github/scripts/check-commit-convention.py

---
name: oom-playbook-container-test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  debian:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: apt-get update && apt-get install -y ansible
      - name: Install ansible collections
        run: ansible-galaxy collection install ansible.posix community.general
      - name: Validate thermal-monitor.py syntax
        run: python3 -m py_compile roles/thermal_throttling/files/thermal-monitor.py
      - name: Validate OOM playbook syntax
        run: ansible-playbook playbook.yml --syntax-check
      - name: Dry-run OOM playbook check mode
        run: 'ansible-playbook playbook.yml --check; echo "exit: $?"'

  fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: dnf install -y ansible-core
      - name: Install ansible collections
        run: ansible-galaxy collection install ansible.posix community.general
      - name: Validate thermal-monitor.py syntax
        run: python3 -m py_compile roles/thermal_throttling/files/thermal-monitor.py
      - name: Validate OOM playbook syntax
        run: ansible-playbook playbook.yml --syntax-check
      - name: Dry-run OOM playbook check mode
        run: 'ansible-playbook playbook.yml --check; echo "exit: $?"'

  archlinux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: pacman -Sy --noconfirm ansible
      - name: Install ansible collections
        run: ansible-galaxy collection install ansible.posix community.general
      - name: Validate thermal-monitor.py syntax
        run: python3 -m py_compile roles/thermal_throttling/files/thermal-monitor.py
      - name: Validate OOM playbook syntax
        run: ansible-playbook playbook.yml --syntax-check
      - name: Dry-run OOM playbook check mode
        run: 'ansible-playbook playbook.yml --check; echo "exit: $?"'

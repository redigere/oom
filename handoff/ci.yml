---
workflows:
  - name: oom-playbook-lint
    jobs:
      - yamllint_strict
      - ansible_lint_production
  - name: oom-playbook-syntax
    jobs:
      - ansible_playbook_syntax_check
  - name: validate-oom-formulas
    jobs:
      - python_formula_validation
  - name: oom-playbook-structure-verify
    jobs:
      - python_convention_verification
      - commit_signoff_check
      - handoff_split_check
  - name: oom-kernel-baseline-bump
    trigger: weekly_schedule
    jobs:
      - kernel_version_detection
      - feature_collection
      - formula_validation
      - structure_verification
      - baseline_commit
  - name: oom-commit-convention
    jobs:
      - conventional_commit_check
  - name: oom-playbook-container-test
    jobs:
      - debian_syntax_check
      - fedora_syntax_check
      - arch_syntax_check
scripts:
  - path: .github/scripts/validate-formulas.py
    scope: formula_validation
  - path: .github/scripts/verify-structure.py
    scope: convention_verification
  - path: .github/scripts/check-handoff-split.py
    scope: handoff_split_check
  - path: .github/scripts/check-commit-convention.py
    scope: conventional_commit_check
  - path: handoff/render.py
    scope: handoff_rendering_and_schema_validation
  - path: handoff/update-baseline.py
    scope: kernel_baseline_update

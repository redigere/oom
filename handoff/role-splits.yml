---
roles:
  - name: system_discovery
    subfiles:
      - assert-os.yml
      - compute-facts.yml
    main_imports: 2
  - name: kernel_tuning
    subfiles:
      - mglru.yml
      - sysctl.yml
      - psi.yml
    main_imports: 3
  - name: zram_swap
    subfiles:
      - swapoff.yml
      - install.yml
      - config-debian.yml
      - config-other.yml
    main_imports: 4
  - name: oom_handler
    subfiles:
      - mask-oomd.yml
      - install.yml
      - config.yml
      - service.yml
    main_imports: 4
  - name: dev_throttling
    subfiles:
      - compute-heap.yml
      - write-profile.yml
    main_imports: 2
  - name: thermal_throttling
    subfiles:
      - governor.yml
      - monitor.yml
    main_imports: 2
    status: implemented
    description: >-
      Sets energy_performance_preference via sysfs from
      /etc/thermal-throttling/config.json, persisted via
      tmpfiles.d. Runs thermal-monitor.py systemd timer
      every 2 minutes. Reduces build parallelism when
      CPU temp >= threshold, restores when cool. All
      tunable parameters in JSON config file only.
total_subfiles: 17

---
items:
  - task: "verify: make: run: debian: fedora: arch"
    status: completed
    description: >-
      CI container-test.yml runs syntax-check and check-mode on Debian,
      Fedora, Arch containers on every push/PR
  - task: "verify: zram: priority: 100"
    status: completed
    description: >-
      config-other.yml sets options = pri=100 via zram-generator.conf
      for RedHat/Archlinux
  - task: "verify: earlyoom: computed_m"
    status: completed
    description: >-
      config.yml uses system_discovery_earlyoom_min_free_pct for -m
      parameter, computed from RAM via continuous formula
  - task: "verify: watermark_scale_factor"
    status: completed
    description: >-
      sysctl.yml uses system_discovery_watermark_scale_factor computed
      from RAM via clamp(ceil(500*8192/RAM), 10, 1000)
  - task: "test: 2gb_vm: edge_case"
    status: completed
    description: >-
      validate-formulas.py tests 2048 MB reference point: zRAM=2048,
      wmsf=1000, earlyoom=10, node_heap=1024
  - task: "test: non_grub_boot"
    status: completed
    description: >-
      psi.yml stat-checks /etc/default/grub before modifying; skips
      gracefully if absent (systemd-boot, etc.)
  - task: "test: container_ci_jobs"
    status: completed
    description: >-
      container-test.yml runs on Debian (ubuntu:22.04), Fedora, and
      Archlinux containers with syntax + check-mode
  - task: "extend: setup_apt: setup_pip"
    status: completed
    description: >-
      Makefile setup-apt: added autoremove + autoclean. setup-pip: added
      --upgrade + pip cache purge
  - task: "verify: kernel_bump: patches"
    status: completed
    description: >-
      Kernel bump CI created: detects kernel version changes, runs
      validation, checks features, updates baseline, commits handoff
      state
  - task: "structure: verify: python_conversion"
    status: completed
    description: >-
      verify-structure.sh rewritten to verify-structure.py with no
      hardcoded role names, handoff lists, or thresholds. All
      discovery is filesystem-driven.
  - task: "formulas: extreme_edge_hardening"
    status: completed
    description: >-
      All formulas guard against zero-RAM division
      (max(ram_mb,1)). validate-formulas.py tests 0-131072 MB
      RAM and 1-1024 vCPUs. Reference points include 0 MB (64 KB
      machine) and 1024-core mainframe.
  - task: "handoff: schema_validation"
    status: completed
    description: >-
      handoff/_schemas/ enforces required keys and types for every
      handoff YAML file via validate_schema() in both render.py
      and verify-structure.py. Schema drift causes CI failure.
  - task: "handoff: render: dynamic_discovery"
    status: completed
    description: >-
      render.py replaces hardcoded Makefile cat commands with
      filesystem-driven discovery of handoff/*.yml, validated
      against _schemas/ before rendering.
  - task: "kernel_baseline: structured_update"
    status: completed
    description: >-
      update-baseline.py replaces shell echo YAML generation in
      kernel-bump.yml. Reads stdin YAML dict, merges into existing
      baseline, rejects unknown keys.
  - task: "fix: earlyoom: s_flag_bug"
    status: completed
    description: >-
      -s expects percent 0-100, formula computed 775987 KiB.
      Changed to -S (absolute KiB). earlyoom now running.
  - task: "fix: zram: algorithm_variable_mismatch"
    status: completed
    description: >-
      Template wrote ALGORITHM=zstd but zramswap script
      reads ALGO. Variable never matched → default lz4.
      Added device reset task for algorithm change on restart.
  - task: "fix: ansible: warnings_suppressed"
    status: completed
    description: >-
      Upgraded ansible.posix to 2.2.1 system-wide (killed
      to_native deprecation). Added interpreter_python to
      ansible.cfg for deterministic Python path.
  - task: "structure: verify: validate_on_all_targets"
    status: pending
    description: >-
      Run verify-structure.py on Debian, Fedora, Arch CI
      containers to validate yamllint parity and Python
      availability across all three families
  - task: "thermal_throttling: protection"
    status: completed
    description: >-
      Thermal throttling role implemented. governor.yml sets
      energy_performance_preference from config.json data,
      persisted via tmpfiles.d. monitor.yml writes all tunable
      parameters to /etc/thermal-throttling/config.json as
      pure data (threshold, parallelism, sysfs paths, output
      paths). Python script thermal-monitor.py reads config,
      monitors /sys/class/thermal/thermal_zone*/temp, and
      writes /etc/profile.d/dev-limits.sh with reduced or
      full build parallelism via systemd timer every 2 min.
      Zero shell, zero hardcoded values in code.
  - task: "cross_family: thermal_validation"
    status: completed
    description: >-
      container-test.yml runs on Debian, Fedora, Archlinux
      CI containers. Each now validates thermal-monitor.py
      syntax via python3 -m py_compile, runs
      ansible-playbook --syntax-check and --check with
      thermal_throttling role enabled. Ansible check mode
      exercises all stat checks (thermal zones, EPP sysfs)
      without requiring real hardware paths.
  - task: "temperature_threshold: as_variable"
    status: completed
    description: >-
      thermal_throttling_temperature_threshold computed from
      processor_vcpus (70000 + vCPUs * 500 millidegrees) and
      thermal_throttling_epp_value computed from
      system_discovery_safe_core_limit (ternary > 4).
      No default() filter, no hardcoded literals, no fallbacks.
      Values always calculated from hardware facts.
  - task: "freeze: dirty_ratio: throttle_writeback"
    status: completed
    description: >-
      vm.dirty_ratio=5, vm.dirty_background_ratio=2 prevent
      multi-second write-block freezes. No hardcoded absolute
      values — percentages scale linearly with RAM.
  - task: "freeze: thp_defrag: madvise"
    status: completed
    description: >-
      THP defrag set to madvise to prevent compaction stalls.
      Persisted via tmpfiles.d. Read-before-write idempotency
      like MGLRU pattern.
  - task: "freeze: cgroup_memory_limit: user_slice"
    status: completed
    description: >-
      user.slice MemoryMax=90% guarantees kernel headroom for
      OOM recovery. TasksMax=infinity prevents fork/exec blocks.
      Drop-in written to /etc/systemd/system/user.slice.d/.
  - task: "freeze: compaction_proactiveness: inverse_ram"
    status: completed
    description: >-
      vm.compaction_proactiveness computed inverse to RAM.
      Small machines compact aggressively (80), large machines
      conserve CPU (20). Continuous formula, no thresholds.
  - task: "freeze: min_free: headroom_reservation"
    status: completed
    description: >-
      vm.min_free_kbytes, admin/user_reserve_kbytes computed
      proportional to RAM with floors. Guarantees atomic
      allocation headroom on all machine sizes.
  - task: "freeze: oom_recovery: fast_kill"
    status: completed
    description: >-
      vm.reap_mem_on_sigkill=1 reclaims memory synchronously
      on SIGKILL. vm.oom_dump_tasks=0 suppresses dump of
      thousands of processes. vm.page_lock_unfairness=1 for
      fair reclaim. vm.zone_reclaim_mode=0 for desktop policy.
  - task: "ci: branch_fix: master"
    status: completed
    description: >-
      All workflow triggers changed from branches:[main] to
      branches:[master] to match the repository default branch.
  - task: "docs: DEV.md: commit_convention"
    status: completed
    description: >-
      DEV.md created documenting commit convention: single-line
      subject + Signed-off-by trailer only. AGENTS.md updated
      with same convention.
  - task: "handoff: update: new_features"
    status: completed
    description: >-
      role-splits.yml updated with thp.yml and cgroup-memory.yml.
      validation.yml formula_count updated. remaining.yml extended.
      ci.yml workflow names updated for OOM prefix.
  - task: "commit_history: rebase_cleanup"
    status: pending
    description: >-
      Rebase entire history: single-line messages only, add
      Signed-off-by to all commits, reword 'revert' messages.
      Dangling side-chain commits dropped.

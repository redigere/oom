---
items:
  - task: verify_make_run_debian_fedora_arch
    status: completed
    description: >-
      CI container-test.yml runs syntax-check and check-mode on Debian,
      Fedora, Arch containers on every push/PR
  - task: verify_zram_priority_100
    status: completed
    description: >-
      config-other.yml sets options = pri=100 via zram-generator.conf
      for RedHat/Archlinux
  - task: verify_earlyoom_computed_m
    status: completed
    description: >-
      config.yml uses system_discovery_earlyoom_min_free_pct for -m
      parameter, computed from RAM via continuous formula
  - task: verify_watermark_scale_factor
    status: completed
    description: >-
      sysctl.yml uses system_discovery_watermark_scale_factor computed
      from RAM via clamp(ceil(500*8192/RAM), 10, 1000)
  - task: test_2gb_vm_edge_case
    status: completed
    description: >-
      validate-formulas.py tests 2048 MB reference point: zRAM=2048,
      wmsf=1000, earlyoom=10, node_heap=1024
  - task: test_non_grub_boot
    status: completed
    description: >-
      psi.yml stat-checks /etc/default/grub before modifying; skips
      gracefully if absent (systemd-boot, etc.)
  - task: test_container_ci_jobs
    status: completed
    description: >-
      container-test.yml runs on Debian (ubuntu:22.04), Fedora, and
      Archlinux containers with syntax + check-mode
  - task: extend_setup_apt_setup_pip
    status: completed
    description: >-
      Makefile setup-apt: added autoremove + autoclean. setup-pip: added
      --upgrade + pip cache purge
  - task: verify_kernel_bump_patches
    status: completed
    description: >-
      Kernel bump CI created: detects kernel version changes, runs
      validation, checks features, updates baseline, commits handoff
      state
  - task: structure_verify_python_conversion
    status: completed
    description: >-
      verify-structure.sh rewritten to verify-structure.py with no
      hardcoded role names, handoff lists, or thresholds. All
      discovery is filesystem-driven.
  - task: formulas_extreme_edge_hardening
    status: completed
    description: >-
      All formulas guard against zero-RAM division
      (max(ram_mb,1)). validate-formulas.py tests 0-131072 MB
      RAM and 1-1024 vCPUs. Reference points include 0 MB (64 KB
      machine) and 1024-core mainframe.
  - task: handoff_schema_validation
    status: completed
    description: >-
      handoff/_schemas/ enforces required keys and types for every
      handoff YAML file via validate_schema() in both render.py
      and verify-structure.py. Schema drift causes CI failure.
  - task: handoff_render_dynamic_discovery
    status: completed
    description: >-
      render.py replaces hardcoded Makefile cat commands with
      filesystem-driven discovery of handoff/*.yml, validated
      against _schemas/ before rendering.
  - task: kernel_baseline_structured_update
    status: completed
    description: >-
      update-baseline.py replaces shell echo YAML generation in
      kernel-bump.yml. Reads stdin YAML dict, merges into existing
      baseline, rejects unknown keys.
  - task: structure_verify_validate_on_all_targets
    status: pending
    description: >-
      Run verify-structure.py on Debian, Fedora, Arch CI
      containers to validate yamllint parity and Python
      availability across all three families
  - task: thermal_throttling_protection
    status: completed
    description: >-
      Thermal throttling role implemented. governor.yml sets
      energy_performance_preference from config.json data,
      persisted via tmpfiles.d. monitor.yml writes all tunable
      parameters to /etc/thermal-throttling/config.json as
      pure data (threshold, parallelism, sysfs paths, output
      paths). Python script thermal-monitor.py reads config,
      monitors /sys/class/thermal/thermal_zone*/temp, and
      writes /etc/profile.d/dev-limits.sh with reduced or
      full build parallelism via systemd timer every 2 min.
      Zero shell, zero hardcoded values in code.
  - task: cross_family_thermal_validation
    status: completed
    description: >-
      container-test.yml runs on Debian, Fedora, Archlinux
      CI containers. Each now validates thermal-monitor.py
      syntax via python3 -m py_compile, runs
      ansible-playbook --syntax-check and --check with
      thermal_throttling role enabled. Ansible check mode
      exercises all stat checks (thermal zones, EPP sysfs)
      without requiring real hardware paths.
  - task: temperature_threshold_as_variable
    status: pending
    description: >-
      The set_fact values for temperature threshold and EPP
      are currently computed policy constants (balance_performance,
      80000). A default() filter was attempted but rejected:
      fallbacks violate the "always computed" paradigm.
      If per-machine override is needed, the value must be
      computed from system_discovery facts, not defaulted.
      Current design: constant policy values set via set_fact,
      written to /etc/thermal-throttling/config.json as data.
      The paradigm (data in JSON, code in Python/Ansible) is
      already satisfied.
